name: prices

on:
  workflow_dispatch:
  schedule:
    # Daily 03:30 UTC — full Limitless sweep takes ~25 min at concurrency 3.
    - cron: "30 3 * * *"

permissions:
  contents: write

# Opt remaining node20 actions (upload-artifact@v4) into node24 ahead of the
# 2026-06-16 forced switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: prices
  cancel-in-progress: false

jobs:
  prices:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Scrape prices
        run: node scripts/prices.mjs

      - name: Upload diagnostics report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prices-report
          path: data/prices/unmapped.json
          if-no-files-found: ignore

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "data: prices $(date -u +%Y-%m-%d)"
            git push
          fi
