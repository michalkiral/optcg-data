name: scrape

on:
  workflow_dispatch:
  schedule:
    # Mondays 06:00 UTC — new sets ship every ~1-2 months, weekly is ample.
    - cron: "0 6 * * 1"

permissions:
  contents: write

# Opt remaining node20 actions (rust-cache etc.) into node24 ahead of the
# 2026-06-16 forced switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install vegapull
        # crates.io lags behind; install the current CLI straight from git.
        run: cargo install --git https://github.com/Coko7/vegapull --locked

      - name: Pull raw card data
        run: node scripts/pull.mjs

      - name: Transform into published schema
        env:
          GENERATED_AT: ${{ github.event.repository.updated_at }}
          VEGAPULL_VERSION: vega-git
        run: |
          GENERATED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          VEGAPULL_VERSION="$(vega --version 2>/dev/null || echo vega-git)" \
          node scripts/transform.mjs

      - name: Commit if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no changes"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "data: update $(date -u +%Y-%m-%d)"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # jsDelivr caches @main files 12 h at the edge (and tells browsers 7 d) —
      # purge the catalog files so new sets and promo prints show up right away.
      - name: Purge jsDelivr cache
        if: steps.commit.outputs.pushed == 'true'
        run: |
          purge() {
            curl -fsS "https://purge.jsdelivr.net/gh/${GITHUB_REPOSITORY}@main/$1" > /dev/null \
              || echo "warn: purge failed for $1"
          }
          purge "data/packs.json"
          purge "data/manifest.json"
          purge "data/index/cards_by_id.json"
          for f in data/cards/*.json; do
            purge "$f"
          done
